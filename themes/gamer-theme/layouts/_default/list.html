{{ define "main" }}
<div class="list-page">
  <div class="list-container">
    <h1 class="list-title">CATEGORIES</h1>
    <p class="list-desc">Browse gaming slang by category.</p>
    <h2 class="list-subtitle">ALL TERMS</h2>
    <div class="list-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="list-item">
        <img src="/slang/{{ .Params.slug }}/featured.jpg" alt="{{ .Title }}" class="list-item-img">
        <div class="list-item-body">
          <h3 class="list-item-title">{{ .Title }}</h3>
          <p class="list-item-desc">{{ .Params.shortDescription }}</p>
          {{ with .Params.tags }}
          <div class="list-item-tags">
            {{ range first 2 . }}
            <span class="list-item-tag">#{{ . }}</span>
            {{ end }}
          </div>
          {{ end }}
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
      </a>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
