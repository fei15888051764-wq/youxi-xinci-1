{{ define "main" }}
<section class="terms-section" style="min-height:100vh;background:#0c0f0c;padding-top:80px;">
  <div style="max-width:1200px;margin:0 auto;padding:32px 24px;">
    <div style="margin-bottom:40px;">
      <h2 style="font-family:'Press Start 2P',cursive;font-size:22px;color:#f0f0f0;margin-bottom:8px;">#{{ .Title | upper }}</h2>
      <p style="color:#8c8c8c;">{{ len .Pages }} GAMING SLANG TERM{{ if ne (len .Pages) 1 }}S{{ end }}</p>
    </div>
    <div class="cards-grid">
      {{ range .Pages.ByDate.Reverse }}
      <a href="{{ .RelPermalink }}" class="card">
        <div class="card-img-wrap">
          <img src="/slang/{{ replace .Params.slug "-gaming" "" }}-card.jpg" alt="{{ .Title }}" class="card-img" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="card-body">
          <h3 class="card-title-text">{{ .Title }}</h3>
          <p class="card-desc">{{ .Params.shortDescription }}</p>
          <div class="card-bottom">
            <div class="card-tags">
              {{ range .Params.tags }}
              <span class="card-tag">{{ . }}</span>
              {{ end }}
            </div>
            <span class="card-date">{{ .Params.updated }}</span>
          </div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
